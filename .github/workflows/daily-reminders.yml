name: Daily Expiry Reminder

on:
  workflow_dispatch:
  schedule:
    # Run every day at midnight (18:30 UTC previous day)
    - cron: '30 18 * * *'

env: 
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Daily Reminders
        run: |
          echo "🚀 Starting daily expiry reminder check at $(date)"
          echo "🔍 SUPABASE_URL: $SUPABASE_URL"
          echo "🔍 SUPABASE_ANON_KEY exists: ${{ secrets.SUPABASE_ANON_KEY != '' }}"
          
          curl -X POST "$SUPABASE_URL/functions/v1/daily-reminders" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{"name":"daily-reminder"}'
          echo "✅ Daily reminder trigger completed at $(date)"